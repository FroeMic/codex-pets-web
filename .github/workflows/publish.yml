name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish with"
        required: true
        default: "next"
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run pack:dry

      - name: Verify npm publish ownership
        run: |
          set -euo pipefail

          npm_user="$(npm whoami)"
          echo "Publishing as npm user: ${npm_user}"

          if npm view codex-pets-core version >/dev/null 2>&1; then
            npm owner ls codex-pets-core | awk '{print $1}' | grep -Fx "${npm_user}"
          else
            echo "codex-pets-core is not published yet; first publish is allowed."
          fi

          npm owner ls codex-pets-react | awk '{print $1}' | grep -Fx "${npm_user}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish core
        run: npm publish -w packages/core --access public --provenance --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish React
        run: npm publish -w packages/react --access public --provenance --tag "${{ inputs.npm_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
