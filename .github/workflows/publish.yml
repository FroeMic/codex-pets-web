name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      npm_tag:
        description: "npm dist-tag to publish with"
        required: true
        default: "next"
        type: choice
        options:
          - next
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Check package contents
        run: npm run pack:dry

      - name: Verify package ownership metadata
        run: |
          set -euo pipefail

          if npm view codex-pets-core version >/dev/null 2>&1; then
            npm owner ls codex-pets-core
          else
            echo "codex-pets-core is not published yet; first publish is allowed."
          fi

          npm owner ls codex-pets-react

      - name: Publish core
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./packages/core/package.json').name")"
          package_version="$(node -p "require('./packages/core/package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            npm dist-tag add "${package_name}@${package_version}" "${{ inputs.npm_tag }}"
          else
            npm publish -w packages/core --access public --tag "${{ inputs.npm_tag }}"
          fi

      - name: Publish React
        run: |
          set -euo pipefail

          package_name="$(node -p "require('./packages/react/package.json').name")"
          package_version="$(node -p "require('./packages/react/package.json').version")"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            npm dist-tag add "${package_name}@${package_version}" "${{ inputs.npm_tag }}"
          else
            npm publish -w packages/react --access public --tag "${{ inputs.npm_tag }}"
          fi
